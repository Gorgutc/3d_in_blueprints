# Project-local Codex configuration mirror. Keep prose in AGENTS.md and docs.

[agents]
max_threads = 8
max_depth = 1

[project]
name = "3d_in_blueprints"
repository = "Gorgutc/3d_in_blueprints"
branch_prefix = "codex/"
app_stack = "blender-addon-backend"
tooling_runtime = "node-verification-harness"
product_scope = "Blender add-on + local standalone backend"
canonical_output = "svg"

[workflow]
verify_command = "npm run verify"
ship_command = "npm run codex:ship"
bootstrap_doc = "docs/agent/bootstrap.md"
orchestration_doc = "docs/agent/orchestration.md"

[[profiles]]
name = "windows-exe"
status = "dormant"
doc = "docs/agent/profiles/windows-exe.md"

[[profiles]]
name = "blender-addon"
status = "active"
doc = "docs/agent/profiles/blender-addon.md"
