name: Codex Infrastructure

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  codex-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run codex:ship
